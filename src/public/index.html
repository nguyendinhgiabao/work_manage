<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ứng dụng quản lý công việc hiện đại - Quản lý task hiệu quả">
  <title>TaskFlow - Quản Lý Công Việc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== AUTH SECTION ========== -->
  <div id="auth-section" class="auth-section">
    <div class="auth-background">
      <div class="floating-shape shape-1"></div>
      <div class="floating-shape shape-2"></div>
      <div class="floating-shape shape-3"></div>
    </div>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="12" fill="url(#logo-gradient)"/>
              <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="logo-gradient" x1="0" y1="0" x2="40" y2="40">
                  <stop stop-color="#6366f1"/>
                  <stop offset="1" stop-color="#8b5cf6"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>TaskFlow</h1>
          <p class="auth-subtitle">Quản lý công việc thông minh</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="example@email.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Mật khẩu</label>
            <input type="password" id="login-password" placeholder="Nhập mật khẩu" required>
          </div>
          <button type="submit" id="login-btn" class="btn btn-primary">Đăng nhập</button>
          <p class="auth-switch">Chưa có tài khoản? <a href="#" id="show-register">Đăng ký ngay</a></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label for="register-name">Họ và tên</label>
            <input type="text" id="register-name" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="example@email.com" required>
          </div>
          <div class="form-group">
            <label for="register-password">Mật khẩu</label>
            <input type="password" id="register-password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
          </div>
          <button type="submit" id="register-btn" class="btn btn-primary">Đăng ký</button>
          <p class="auth-switch">Đã có tài khoản? <a href="#" id="show-login">Đăng nhập</a></p>
        </form>

        <div id="auth-error" class="error-message" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ========== DASHBOARD SECTION ========== -->
  <div id="dashboard-section" class="dashboard-section" style="display:none;">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-small">
          <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="12" fill="url(#logo-gradient2)"/>
            <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="logo-gradient2" x1="0" y1="0" x2="40" y2="40">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="sidebar-title">TaskFlow</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all" id="nav-all">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Tất cả</span>
          <span class="badge" id="badge-all">0</span>
        </button>
        <button class="nav-item" data-filter="pending" id="nav-pending">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Chờ xử lý</span>
          <span class="badge" id="badge-pending">0</span>
        </button>
        <button class="nav-item" data-filter="in-progress" id="nav-in-progress">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
          <span>Đang làm</span>
          <span class="badge" id="badge-in-progress">0</span>
        </button>
        <button class="nav-item" data-filter="completed" id="nav-completed">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span>Hoàn thành</span>
          <span class="badge" id="badge-completed">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="user-details">
            <span class="user-name" id="user-name">User</span>
            <span class="user-email" id="user-email">user@email.com</span>
          </div>
        </div>
        <button class="btn-logout" id="logout-btn" title="Đăng xuất">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 id="page-title">Tất cả công việc</h2>
        <button class="btn btn-add" id="add-task-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Thêm công việc</span>
        </button>
      </header>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="stat-card stat-total">
          <div class="stat-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Tổng công việc</span>
          </div>
        </div>
        <div class="stat-card stat-pending">
          <div class="stat-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-pending">0</span>
            <span class="stat-label">Chờ xử lý</span>
          </div>
        </div>
        <div class="stat-card stat-progress">
          <div class="stat-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-progress">0</span>
            <span class="stat-label">Đang làm</span>
          </div>
        </div>
        <div class="stat-card stat-done">
          <div class="stat-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-done">0</span>
            <span class="stat-label">Hoàn thành</span>
          </div>
        </div>
      </div>

      <!-- Task List -->
      <div class="task-list-container">
        <div class="task-list" id="task-list">
          <!-- Tasks will be rendered here -->
        </div>
        <div class="empty-state" id="empty-state" style="display:none;">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h3>Chưa có công việc nào</h3>
          <p>Nhấn "Thêm công việc" để bắt đầu</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ========== TASK MODAL ========== -->
  <div class="modal-overlay" id="task-modal" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Thêm công việc mới</h3>
        <button class="modal-close" id="modal-close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label for="task-title">Tiêu đề <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="Nhập tiêu đề công việc" required>
        </div>
        <div class="form-group">
          <label for="task-description">Mô tả</label>
          <textarea id="task-description" placeholder="Mô tả chi tiết công việc..." rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="task-status">Trạng thái</label>
            <select id="task-status">
              <option value="pending">Chờ xử lý</option>
              <option value="in-progress">Đang làm</option>
              <option value="completed">Hoàn thành</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-priority">Độ ưu tiên</label>
            <select id="task-priority">
              <option value="low">Thấp</option>
              <option value="medium" selected>Trung bình</option>
              <option value="high">Cao</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="task-due-date">Ngày hết hạn</label>
          <input type="date" id="task-due-date">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Hủy</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" style="display:none;"></div>

  <script src="app.js"></script>
</body>
</html>
